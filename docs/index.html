<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Culture Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('jsx', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>
  <style>
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      /* WebKit: gradient shows filled portion */
      background: linear-gradient(
        to right,
        #f5a623 0%,
        #f5a623 var(--fill, 44%),
        #cbd5e1 var(--fill, 44%),
        #cbd5e1 100%
      );
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #f5a623;
      border: 2px solid #c97f0f;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    /* Firefox */
    input[type="range"]::-moz-range-track {
      background: #cbd5e1;
      height: 6px;
      border-radius: 3px;
    }
    input[type="range"]::-moz-range-progress {
      background: #f5a623;
      height: 6px;
      border-radius: 3px 0 0 3px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #f5a623;
      border: 2px solid #c97f0f;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-presets="jsx">
    const { useState } = React;
    const STORAGE_KEY = 'teamCultureMapValues';

    const SLIDERS = [
      {
        id: 'secret-open', left: 'Secret', right: 'Open',
        question: "Can you see everyone's calendar or is info closely guarded?",
        descriptions: [
          "Need-to-know only — most information is confidential by default, even within teams.",
          "Information is shared with direct manager approval; little visibility beyond your reporting line.",
          "Most decisions and data stay within a small leadership circle.",
          "Some info is shared department-wide, but cross-team visibility is limited.",
          "Calendars and docs are visible within your own team, but not company-wide.",
          "Most non-sensitive info (roadmaps, docs, plans) is open across teams.",
          "Calendars, OKRs, and team plans are visible company-wide by default.",
          "Default is public internal docs; keeping something private requires a reason.",
          "Salary bands, strategy discussions, and leadership notes are open to all employees.",
          "Radical transparency — even sensitive financials and most 1:1 notes are visible to everyone."
        ]
      },
      {
        id: 'oral-written', left: 'Oral', right: 'Written',
        question: "Do decisions happen over coffee or in 10-page docs?",
        descriptions: [
          "Nothing is written down — decisions live in people's heads and hallway chats.",
          "Quick verbal agreements on calls or in person drive most outcomes.",
          "Meetings are the primary decision venue; notes are rare or inconsistent.",
          "Decisions are discussed live, with a brief written follow-up afterward.",
          "A mix — some decisions get documented, others remain verbal commitments.",
          "Meetings require a written agenda and produce a short decision summary.",
          "Async written proposals are the default starting point before any discussion.",
          "Longer write-ups (briefs, memos) are expected before a meeting is even scheduled.",
          "Detailed written proposals circulate for review and comment before discussion happens.",
          "Nothing moves without a thorough written doc — reviewed, versioned, and archived."
        ]
      },
      {
        id: 'topdown-bottomup', left: 'Top-down', right: 'Bottom-up',
        question: "Who decides what gets built?",
        descriptions: [
          "Leadership decides everything; teams execute without input on direction.",
          "Senior leaders set priorities; managers translate them downward with little discussion.",
          "Strategy comes from the top, but managers have some local discretion on execution.",
          "Leadership sets the goals; teams choose how to get there.",
          "Shared planning — leadership and teams co-create the roadmap together.",
          "Teams propose priorities; leadership reviews and signs off.",
          "Teams largely self-direct, with leadership providing high-level guardrails.",
          "Individuals and small teams pitch and own initiatives independently.",
          "Anyone can start a project; leadership ratifies it after the fact.",
          "Fully decentralized — no central roadmap; teams build what they believe matters."
        ]
      },
      {
        id: 'fast-deliberate', left: 'Fast', right: 'Deliberate',
        question: "Do we move fast and break things, or plan everything meticulously?",
        descriptions: [
          "Ship constantly and fix issues as they arise — speed over polish, always.",
          "Strong bias toward action; quick experiments, some breakage is accepted.",
          "Move quickly on most things, but pause and slow down for high-risk changes.",
          "Balance of speed and care — quick for small changes, careful for big ones.",
          "Standard review and checks before shipping, but timelines stay tight.",
          "Most changes go through a planning and review cycle before launch.",
          "Significant changes require sign-off from multiple stakeholders before proceeding.",
          "Thorough risk assessment and rollout planning precede any major change.",
          "Heavy process — staged rollouts, extensive testing, multiple approval gates.",
          "Nothing ships without exhaustive planning, review boards, and contingency plans."
        ]
      },
      {
        id: 'backchannels-frontdoors', left: 'Back channels', right: 'Front doors',
        question: "Do you Slack someone directly or file a ticket?",
        descriptions: [
          "Everything happens in DMs and private chats — no shared or public record.",
          "People mostly ping individuals directly to get things done.",
          "Quick asks go via DM; bigger requests get raised in a channel.",
          "A mix of direct messages and team channels, depending on urgency.",
          "Team channels are the norm, but DMs still handle sensitive or quick items.",
          "Most requests go through shared channels or threads, visible to the team.",
          "Tickets or issues are preferred for tracked work; DMs are for quick clarifications only.",
          "Formal request processes (tickets, intake forms) are expected for most asks.",
          "Cross-team requests require a ticket with prioritization and SLAs.",
          "All requests must go through formal intake processes — no informal shortcuts allowed."
        ]
      },
      {
        id: 'allocated-available', left: 'Allocated', right: 'Available',
        question: "Is everyone maxed out or do teams have breathing room?",
        descriptions: [
          "Everyone is overbooked — no slack time, constant context-switching, frequent fire drills.",
          "People run at close to full capacity most weeks with very little buffer.",
          "Occasional breathing room exists, but unplanned work usually causes slippage.",
          "Some slack is built in, but it gets absorbed quickly by urgent requests.",
          "Roughly balanced — planned work plus a modest buffer for the unexpected.",
          "Teams reserve time each sprint or week for exploration or unplanned work.",
          "Comfortable capacity — people can pick up new requests without major reshuffling.",
          "Significant slack; people often have time for side projects or to help others.",
          "Capacity is intentionally underbooked to absorb surprises and support other teams.",
          "Abundant availability — people have substantial discretionary time most weeks."
        ]
      },
      {
        id: 'liquid-crystallized', left: 'Liquid', right: 'Crystallized',
        question: "Can you change your trajectory or wait your turn?",
        descriptions: [
          "Priorities and roles shift constantly — nothing feels fixed for long.",
          "Plans change frequently in response to new information or pressure.",
          "Quarterly plans are directional but commonly revised mid-cycle.",
          "Roadmaps can flex, but core commitments for the quarter are fairly stable.",
          "A balance — commitments hold for a defined cycle, then get revisited.",
          "Plans are set per cycle (quarter or sprint) and rarely change once locked.",
          "Roles, team structures, and roadmaps stay stable for long periods.",
          "Org structure and priorities are set annually and rarely revisited.",
          "Long-term commitments and structures are fixed; changing them requires a formal process.",
          "Highly fixed — roles, plans, and structures rarely change; reorgs are rare events."
        ]
      }
    ];

    function loadValues() {
      try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return (d && typeof d === 'object') ? d : {};
      } catch { return {}; }
    }

    function App() {
      const [values, setValues] = useState(loadValues);

      const update = (id, v) => {
        setValues(prev => {
          const next = { ...prev, [id]: v };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
          return next;
        });
      };

      const reset = () => {
        const def = Object.fromEntries(SLIDERS.map(s => [s.id, 5]));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(def));
        setValues(def);
      };

      return (
        <div className="max-w-2xl mx-auto px-3 py-8 sm:px-6">
          <h1 className="text-2xl sm:text-3xl font-bold text-center mb-1">Team Culture Map</h1>
          <p className="text-center text-slate-500 text-sm mb-8 leading-relaxed px-2">
            Drag each slider to where your team actually operates today (not where you wish it did).
            Your changes are saved automatically.
          </p>

          <div className="space-y-4">
            {SLIDERS.map(s => {
              const v = values[s.id] ?? 5;
              const fillPct = `${((v - 1) / 9) * 100}%`;
              return (
                <div key={s.id} className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 sm:p-5">
                  <p className="text-xs sm:text-sm text-slate-500 italic mb-4">{s.question}</p>

                  {/* Full-width slider — no fixed-width side labels, nothing overflows */}
                  <input
                    type="range"
                    min={1} max={10} step={1}
                    value={v}
                    onChange={e => update(s.id, +e.target.value)}
                    className="w-full"
                    style={{ '--fill': fillPct }}
                    aria-label={`${s.left} to ${s.right}`}
                  />

                  {/* Labels below the slider — always readable, never overflow */}
                  <div className="flex justify-between mt-2 px-0.5">
                    <span className="text-xs sm:text-sm font-semibold text-slate-600">{s.left}</span>
                    <span className="text-xs sm:text-sm font-semibold text-slate-600">{s.right}</span>
                  </div>

                  {/* Context description */}
                  <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2.5 text-xs sm:text-sm text-slate-700 leading-relaxed">
                    <span className="font-semibold text-amber-700 mr-1.5">{v}/10:</span>
                    {s.descriptions[v - 1]}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="flex justify-center mt-6">
            <button
              onClick={reset}
              className="px-4 py-2 text-sm border border-slate-300 bg-white text-slate-700 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition-colors"
            >
              Reset to midpoint
            </button>
          </div>

          <p className="text-center text-slate-400 text-xs italic mt-8 mb-2">
            Framework from "The Staff Engineer's Path" by Tanya Reilly
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
